version: 2.1

orbs:
  architect: giantswarm/architect@9.5.3

workflows:
  test:
    jobs:
      - architect/go-build:
          context: architect
          name: go-build
          binary: manager
          path: ./cmd
          filters:
            # Trigger job also on git tag.
            tags:
              only: /^v.*/
      - architect/push-to-registries:
          context: architect
          name: push-to-registries
          split-china-push: true
          requires:
            - go-build
          filters:
            # Trigger job also on git tag.
            tags:
              only: /^v.*/
            branches:
              ignore:
                - main
                - master
      - architect/sync-china-registry:
          context: architect
          name: sync-china-registry
          requires:
            - go-build
            - push-to-registries
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /^.*$/
      - architect/push-to-app-catalog:
          context: architect
          executor: app-build-suite
          name: push-to-app-catalog
          app_catalog: "control-plane-catalog"
          app_catalog_test: "control-plane-test-catalog"
          chart: "image-distribution-operator"
          requires:
            - push-to-registries
          filters:
            tags:
              only: /^v.*/
